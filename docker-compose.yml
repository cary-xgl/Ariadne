services:
  postgres:
    image: postgres:16-alpine
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: ariadne
      POSTGRES_USER: ariadne
      POSTGRES_PASSWORD: ariadne
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ariadne -d ariadne"]
      interval: 5s
      timeout: 5s
      retries: 10

  freshrss:
    image: freshrss/freshrss:latest
    environment:
      TZ: Asia/Shanghai
      CRON_MIN: "7"
    ports:
      - "8080:80"
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1/i/') === false ? 1 : 0);",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://ariadne:ariadne@postgres:5432/ariadne
      FEISHU_CALLBACK_TOKEN: ${FEISHU_CALLBACK_TOKEN:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FRESHRSS_FEED_URLS: ${FRESHRSS_FEED_URLS:-}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      FRESHRSS_API_BASE_URL: ${FRESHRSS_API_BASE_URL:-}
      FRESHRSS_API_USERNAME: ${FRESHRSS_API_USERNAME:-}
      FRESHRSS_API_PASSWORD: ${FRESHRSS_API_PASSWORD:-}
      FRESHRSS_API_ITEM_LIMIT: ${FRESHRSS_API_ITEM_LIMIT:-50}
      DIGEST_LIMIT: ${DIGEST_LIMIT:-10}
      DIGEST_MIN_IMPORTANCE: ${DIGEST_MIN_IMPORTANCE:--1}
      DIGEST_SCHEDULE_TIMES: ${DIGEST_SCHEDULE_TIMES:-09:00,17:00}
      DIGEST_SCHEDULE_HOURS: ${DIGEST_SCHEDULE_HOURS:-9,17}
      DIGEST_TIMEZONE: ${DIGEST_TIMEZONE:-Asia/Shanghai}
      INGEST_INTERVAL_SECONDS: ${INGEST_INTERVAL_SECONDS:-14400}
      INGEST_MAX_ITEM_AGE_DAYS: ${INGEST_MAX_ITEM_AGE_DAYS:-7}
      INGEST_MAX_ITEMS_PER_FEED: ${INGEST_MAX_ITEMS_PER_FEED:-100}
      PUSH_IMMEDIATE_MIN_IMPORTANCE: ${PUSH_IMMEDIATE_MIN_IMPORTANCE:-0.75}
      RSS_FEED_URLS: ${RSS_FEED_URLS:-}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-5}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-60}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["python", "-m", "ariadne.worker"]
    environment:
      DATABASE_URL: postgresql://ariadne:ariadne@postgres:5432/ariadne
      FEISHU_CALLBACK_TOKEN: ${FEISHU_CALLBACK_TOKEN:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FRESHRSS_FEED_URLS: ${FRESHRSS_FEED_URLS:-}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      FRESHRSS_API_BASE_URL: ${FRESHRSS_API_BASE_URL:-}
      FRESHRSS_API_USERNAME: ${FRESHRSS_API_USERNAME:-}
      FRESHRSS_API_PASSWORD: ${FRESHRSS_API_PASSWORD:-}
      FRESHRSS_API_ITEM_LIMIT: ${FRESHRSS_API_ITEM_LIMIT:-50}
      DIGEST_LIMIT: ${DIGEST_LIMIT:-10}
      DIGEST_MIN_IMPORTANCE: ${DIGEST_MIN_IMPORTANCE:--1}
      DIGEST_SCHEDULE_TIMES: ${DIGEST_SCHEDULE_TIMES:-09:00,17:00}
      DIGEST_SCHEDULE_HOURS: ${DIGEST_SCHEDULE_HOURS:-9,17}
      DIGEST_TIMEZONE: ${DIGEST_TIMEZONE:-Asia/Shanghai}
      INGEST_INTERVAL_SECONDS: ${INGEST_INTERVAL_SECONDS:-14400}
      INGEST_MAX_ITEM_AGE_DAYS: ${INGEST_MAX_ITEM_AGE_DAYS:-7}
      INGEST_MAX_ITEMS_PER_FEED: ${INGEST_MAX_ITEMS_PER_FEED:-100}
      PUSH_IMMEDIATE_MIN_IMPORTANCE: ${PUSH_IMMEDIATE_MIN_IMPORTANCE:-0.75}
      RSS_FEED_URLS: ${RSS_FEED_URLS:-}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-5}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      freshrss:
        condition: service_started

volumes:
  postgres-data:
  freshrss-data:
  freshrss-extensions:
