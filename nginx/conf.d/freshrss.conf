server {
    listen 80;
    server_name _;

    client_max_body_size 32m;

    location = / {
        return 302 /freshrss/;
    }

    location = /freshrss {
        return 301 /freshrss/;
    }

    location = /i {
        return 307 /freshrss/i;
    }

    location /i/ {
        return 307 /freshrss$request_uri;
    }

    location /freshrss/ {
        rewrite ^/freshrss/(.*)$ /$1 break;

        proxy_pass http://freshrss:80;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /freshrss;

        proxy_redirect / /freshrss/;
        proxy_redirect http://$host/ /freshrss/;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
